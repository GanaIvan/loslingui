<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Método 11 + Compras</title>
<style>
  /* Reset básico */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
  header { display: flex; justify-content: space-between; align-items: center; background: #007bff; color: white; padding: 15px 20px; border-radius: 6px 6px 0 0; }
  header h1 { font-size: 1.5rem; }
  header button { background: #ff4b5c; border: none; padding: 8px 15px; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; }
  header button:hover { background: #e03e4e; }

  main { padding: 20px; }
  .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }

  label { display: block; margin-top: 10px; font-weight: bold; }
  input { width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; }
  button#guardar { margin-top: 15px; padding: 10px 20px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; }
  button#guardar:hover { background: #0056b3; }
  .status { margin-top: 8px; font-style: italic; color: green; }

  table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 6px; overflow: hidden; }
  th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
  th { background: #007bff; color: white; }
  tr:nth-child(even) { background: #f9f9f9; }
  tr:hover { background: #f1f1f1; }

  @media (max-width: 600px) {
    header { flex-direction: column; gap: 10px; }
    table, th, td { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Admin Método 11</h1>
  <button id="logout">Cerrar Sesión</button>
</header>

<main>
  <div class="card">
    <h2>Editar Método 11</h2>



    <label>Título de la Imagen:</label>
<input type="text" id="tituloImagen">

<label>URL de la Imagen:</label>
<input type="text" id="urlImagen">

    <label>Título:</label>
    <input type="text" id="titulo">

    <label>Banco:</label>
    <input type="text" id="banco">

    <label>CI:</label>
    <input type="text" id="ci">

    <label>Teléfono:</label>
    <input type="text" id="tlf">

    <button id="guardar">Guardar Cambios</button>
    <p class="status" id="status"></p>
  </div>

  <div class="card">
    <h2>Usuarios Compras</h2>
    <table id="tablaCompras">
      <thead>
        <tr>
          <th>Cédula</th>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Teléfono</th>
          <th>Referencia</th>
          <th>Creado En</th>
        </tr>
      </thead>
      <tbody>
        <!-- Datos se cargarán aquí -->
      </tbody>
    </table>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAe0kZnp_tx1r1tH2q0djTZHSH9X5rhwws",
  authDomain: "loslingui-46cb7.firebaseapp.com",
  projectId: "loslingui-46cb7",
  storageBucket: "loslingui-46cb7.firebasestorage.app",
  messagingSenderId: "53419854784",
  appId: "1:53419854784:web:b5fec42a59bd2f9afb9625"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ----- Verificar login -----
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// ----- Inputs -----
const tituloInput = document.getElementById("titulo");
const bancoInput = document.getElementById("banco");
const ciInput = document.getElementById("ci");
const tlfInput = document.getElementById("tlf");
const status = document.getElementById("status");
const guardarBtn = document.getElementById("guardar");

const tituloImagenInput = document.getElementById("tituloImagen");
const urlImagenInput = document.getElementById("urlImagen");

// ----- Cargar Metodo 11 -----
async function cargarMetodo11() {
  const docRef = doc(db, "metodos_pago", "metodo_11");
  const docSnap = await getDoc(docRef);
  if (docSnap.exists()) {
    const data = docSnap.data();
    tituloInput.value = data.titulo || "";
    bancoInput.value = data.banco || "";
    ciInput.value = data.ci || "";
    tlfInput.value = data.tlf || "";
  } else {
    status.textContent = "❌ Documento metodo_11 no encontrado";
  }
}

// ----- Cargar Banner -----
async function cargarBanner() {
  const docRef = doc(db, "banner", "config");  // <-- aquí va 'config'
  const docSnap = await getDoc(docRef);
  if (docSnap.exists()) {
    const data = docSnap.data();
    tituloImagenInput.value = data.titulo || "";
    urlImagenInput.value = data.imagen || "";
  } else {
    tituloImagenInput.value = "";
    urlImagenInput.value = "";
    status.textContent = "⚠️ Documento banner/config no existe, se creará al guardar";
  }
}

// ----- Guardar cambios -----
guardarBtn.addEventListener("click", async () => {
  try {
    // Guardar metodo_11
    const metodoRef = doc(db, "metodos_pago", "metodo_11");
    await updateDoc(metodoRef, {
      titulo: tituloInput.value.trim(),
      banco: bancoInput.value.trim(),
      ci: ciInput.value.trim(),
      tlf: tlfInput.value.trim()
    });

    // Guardar banner/config (crear si no existe)
    const bannerRef = doc(db, "banner", "config");
    await setDoc(bannerRef, {
      titulo: tituloImagenInput.value.trim(),
      imagen: urlImagenInput.value.trim()
    }, { merge: true });

    status.textContent = "✅ Cambios guardados correctamente";
  } catch (error) {
    console.error("Error guardando cambios:", error);
    status.textContent = "❌ Error al guardar cambios";
  }
});

// ----- Tabla Usuarios Compras -----
const tablaBody = document.querySelector("#tablaCompras tbody");

async function cargarUsuariosCompras() {
  tablaBody.innerHTML = "";
  try {
    const querySnapshot = await getDocs(collection(db, "usuarios_compras"));
    if (querySnapshot.empty) {
      tablaBody.innerHTML = `<tr><td colspan="6">No hay datos de compras</td></tr>`;
      return;
    }
    querySnapshot.forEach(doc => {
      const data = doc.data();
      const fila = document.createElement("tr");
      fila.innerHTML = `
        <td>${data.cedula || ""}</td>
        <td>${data.nombre || ""}</td>
        <td>${data.correo || ""}</td>
        <td>${data.telefono || ""}</td>
        <td>${data.referencia || ""}</td>
        <td>${data.creado_en || ""}</td>
      `;
      tablaBody.appendChild(fila);
    });
  } catch (error) {
    console.error("Error cargando usuarios_compras:", error);
    tablaBody.innerHTML = `<tr><td colspan="6">❌ Error al cargar los datos</td></tr>`;
  }
}

// ----- Cerrar Sesión -----
const logoutBtn = document.getElementById("logout");
logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});

// ----- Iniciar -----
document.addEventListener("DOMContentLoaded", () => {
  cargarMetodo11();
  cargarBanner();
  cargarUsuariosCompras();
});
</script>

</body>
</html>
